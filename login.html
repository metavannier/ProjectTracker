<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectTimeTracker — Access</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #0d1117;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #c9d1d9;
            overflow: hidden;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(33, 200, 122, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(33, 200, 122, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 380px;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            border: 1.5px solid #21c87a;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .logo-icon svg {
            width: 26px;
            height: 26px;
            stroke: #21c87a;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .logo-title {
            font-size: 13px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #8b949e;
            font-weight: normal;
        }

        .logo-title span {
            color: #21c87a;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 2rem;
        }

        .card-label {
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #8b949e;
            margin-bottom: 1.5rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #8b949e;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        input[type="password"] {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 0.65rem 2.5rem 0.65rem 0.9rem;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            color: #c9d1d9;
            letter-spacing: 0.2em;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="password"]:focus {
            border-color: #21c87a;
        }

        input[type="password"]::placeholder {
            letter-spacing: 0.05em;
            color: #3d444d;
            font-size: 13px;
        }

        .toggle-eye {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #3d444d;
            padding: 0;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }

        .toggle-eye:hover { color: #8b949e; }

        .toggle-eye svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .error-msg {
            font-size: 11px;
            color: #f85149;
            margin-top: 0.5rem;
            display: none;
            letter-spacing: 0.05em;
        }

        .error-msg.visible { display: block; }

        .submit-btn {
            width: 100%;
            margin-top: 1.25rem;
            background: #21c87a;
            border: none;
            border-radius: 6px;
            padding: 0.7rem;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #0d1117;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .submit-btn:hover { background: #2dd88a; }
        .submit-btn:active { transform: scale(0.98); }

        .submit-btn.loading {
            background: #1a9e61;
            cursor: not-allowed;
            letter-spacing: 0.3em;
        }

        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 11px;
            color: #3d444d;
            letter-spacing: 0.08em;
        }

        /* Shake animation on wrong password */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        .shake { animation: shake 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .container { animation: fadeIn 0.4s ease; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="16" rx="2"/>
                <path d="M3 9h18M8 4v5M8 14h4M8 17h6"/>
            </svg>
        </div>
        <div class="logo-title"><span>Project</span>TimeTracker</div>
    </div>

    <div class="card">
        <div class="card-label">// restricted access</div>

        <div class="input-group">
            <label for="password">Access key</label>
            <div class="input-wrapper">
                <input
                    type="password"
                    id="password"
                    placeholder="enter password"
                    autocomplete="current-password"
                    autofocus
                />
                <button class="toggle-eye" onclick="toggleVisibility()" aria-label="Toggle password visibility" tabindex="-1">
                    <svg id="eye-icon" viewBox="0 0 24 24">
                        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
            <div class="error-msg" id="error-msg">// access denied — invalid key</div>
        </div>

        <button class="submit-btn" id="submit-btn" onclick="checkPassword()">
            Enter
        </button>
    </div>

    <div class="footer-note">Project Time Tracker · T. Vannier</div>
</div>

<script>
    // ─── SET YOUR PASSWORD HERE ────────────────────────────────────────────────
    const CORRECT_PASSWORD = "PASSWORD";
    // ──────────────────────────────────────────────────────────────────────────

    const input = document.getElementById('password');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');
    const card = document.querySelector('.card');

    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') checkPassword();
        errorMsg.classList.remove('visible');
    });

    function toggleVisibility() {
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        const icon = document.getElementById('eye-icon');
        icon.innerHTML = isPassword
            ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
            : '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>';
    }

    function checkPassword() {
        const val = input.value;
        if (!val) return;

        if (val === CORRECT_PASSWORD) {
            submitBtn.textContent = 'Authenticated...';
            submitBtn.classList.add('loading');
            // Set a session cookie so the page remembers
            sessionStorage.setItem('pt_auth', '1');
            setTimeout(() => {
                window.location.href = '/index.html';
            }, 600);
        } else {
            errorMsg.classList.add('visible');
            card.classList.remove('shake');
            void card.offsetWidth; // reflow to restart animation
            card.classList.add('shake');
            input.value = '';
            input.focus();
        }
    }

    // If already authenticated this session, skip straight to the app
    if (sessionStorage.getItem('pt_auth') === '1') {
        window.location.href = '/index.html';
    }
</script>

</body>
</html>
